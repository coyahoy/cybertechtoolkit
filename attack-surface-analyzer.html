<!DOCTYPE html>
<html>
<head>
<title>Attack Surface Analyzer | CyberTechToolkit</title>
<meta name="description" content="Understand what attackers might look for when analyzing a domain's attack surface.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
padding:40px 20px;
margin:0;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
margin-bottom:20px;
font-size:34px;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:16px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
box-shadow:0 14px 30px rgba(0,0,0,0.24);
}

.label{
color:#9ca3af;
font-size:13px;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:8px;
margin-top:14px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#f8fafc;
color:#0f172a;
font-family:monospace;
}

button{
margin-top:16px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
color:#08111f;
}

button:hover{
background:#00e5c0;
}

.status{
margin-top:16px;
color:#9ca3af;
text-align:center;
}

.result{
margin-top:20px;
background:#0f172a;
border:1px solid #1f2937;
padding:18px;
border-radius:12px;
line-height:1.7;
}

.section-title{
color:#00ffd5;
margin-top:10px;
font-weight:bold;
}

.note{
margin-top:14px;
color:#94a3b8;
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="back">
<a href="/">← Back</a>
</div>

<h1>Attack Surface Analyzer</h1>

<div class="box">

<div class="label">Domain</div>
<input id="domain" placeholder="example.com">

<button onclick="analyze()">Analyze Attack Surface</button>
<button onclick="example()">Load Example</button>

<div class="status" id="status">
Enter a domain to simulate an attack surface analysis.
</div>

<div class="result" id="result">
Attack surface results will appear here.
</div>

<div class="note">
This tool explains common reconnaissance steps attackers perform when analyzing a target domain.
</div>

</div>

<script>

function analyze(){

const domain=document.getElementById("domain").value

if(!domain){
document.getElementById("status").innerText="Enter a domain."
return
}

let output=""

output+="<div class='section-title'>Possible Reconnaissance Areas</div><br>"

output+="• Subdomains (dev."+domain+", api."+domain+", mail."+domain+")<br>"
output+="• Public login portals<br>"
output+="• Misconfigured cloud storage<br>"
output+="• Exposed API endpoints<br>"
output+="• Old or forgotten web applications<br><br>"

output+="<div class='section-title'>Common Ports Attackers Scan</div><br>"

output+="• 80 / 443 – Web servers<br>"
output+="• 22 – SSH<br>"
output+="• 3389 – Remote Desktop<br>"
output+="• 21 – FTP<br>"
output+="• 25 – Mail servers<br><br>"

output+="<div class='section-title'>Things Security Teams Should Monitor</div><br>"

output+="• Unpatched software<br>"
output+="• Default credentials<br>"
output+="• Exposed admin panels<br>"
output+="• Public test environments<br>"
output+="• Unused open ports<br>"

document.getElementById("result").innerHTML=output
document.getElementById("status").innerText="Attack surface overview generated."

}

function example(){

document.getElementById("domain").value="example.com"
analyze()

}

</script>

</body>
</html>
