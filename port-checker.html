<!DOCTYPE html>
<html>
<head>

<title>Port Checker - CyberTechToolkit</title>

<style>

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="back">
<a href="/">← Back to CyberTechToolkit</a>
</div>

<h1>Port Checker</h1>

<div class="box">

Enter Host

<input id="host" placeholder="example.com">

Enter Port

<input id="port" placeholder="80">

<button onclick="checkPort()">Check Port</button>

<div class="result" id="result"></div>

</div>

<script>

async function checkPort(){

const host = document.getElementById("host").value;
const port = document.getElementById("port").value;

const result = document.getElementById("result");

if(!host || !port){
result.innerText = "Enter host and port.";
return;
}

result.innerText = "Checking...";

try{

await fetch(`https://${host}:${port}`, {mode:"no-cors"});

result.innerText = "Port may be OPEN";

}catch{

result.innerText = "Port may be CLOSED or BLOCKED";

}

}

</script>

</body>
</html>
