<!DOCTYPE html>
<html>
<head>
  <title>Email Header Analyzer | CyberTechToolkit</title>
  <meta name="description" content="Analyze raw email headers for SPF, DKIM, DMARC, sender path, and routing clues.">
  <style>
    body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>
  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>Email Header Analyzer</h1>

  <div class="box">
    <div class="label">Paste Raw Email Headers</div>
    <textarea id="headersInput" placeholder="Paste full email headers here..."></textarea>

    <div style="text-align:center;">
      <button onclick="analyzeHeaders()">Analyze</button>
      <button onclick="loadExample()">Load Example</button>
      <button onclick="clearHeaders()">Clear</button>
    </div>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
  </div>

  <script>
    function getHeaderValue(raw, name) {
      const regex = new RegExp("^" + name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ":(.*(?:\\r?\\n[ \\t].*)*)", "im");
      const match = raw.match(regex);
      return match ? match[1].replace(/\r?\n[ \t]+/g, " ").trim() : "";
    }

    function addCard(title, cls, body) {
      return `
        <div class="card">
          <div class="${cls}" style="font-weight:bold; margin-bottom:6px;">${title}</div>
          <div class="muted">${body}</div>
        </div>
      `;
    }

    function analyzeHeaders() {
      const raw = document.getElementById("headersInput").value.trim();
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.innerText = "";
      results.innerHTML = "";

      if (!raw) {
        status.innerText = "Please paste email headers first.";
        return;
      }

      const from = getHeaderValue(raw, "From");
      const returnPath = getHeaderValue(raw, "Return-Path");
      const subject = getHeaderValue(raw, "Subject");
      const messageId = getHeaderValue(raw, "Message-ID");
      const receivedSpf = getHeaderValue(raw, "Received-SPF");
      const authResults = getHeaderValue(raw, "Authentication-Results");
      const dkimSig = getHeaderValue(raw, "DKIM-Signature");

      let output = "";

      output += addCard("From", "good", from ? `<code>${from}</code>` : "Header not found.");
      output += addCard("Return-Path", "good", returnPath ? `<code>${returnPath}</code>` : "Header not found.");
      output += addCard("Subject", "good", subject ? `<code>${subject}</code>` : "Header not found.");
      output += addCard("Message-ID", "good", messageId ? `<code>${messageId}</code>` : "Header not found.");

      if (receivedSpf) {
        const spfLower = receivedSpf.toLowerCase();
        if (spfLower.includes("pass")) {
          output += addCard("SPF", "good", `SPF appears to pass.<br><code>${receivedSpf}</code>`);
        } else if (spfLower.includes("fail") || spfLower.includes("softfail")) {
          output += addCard("SPF", "bad", `SPF indicates a problem.<br><code>${receivedSpf}</code>`);
        } else {
          output += addCard("SPF", "warn", `SPF found but result is unclear.<br><code>${receivedSpf}</code>`);
        }
      } else {
        output += addCard("SPF", "warn", "No Received-SPF header found.");
      }

      if (dkimSig) {
        output += addCard("DKIM Signature", "good", "DKIM-Signature header is present.");
      } else {
        output += addCard("DKIM Signature", "warn", "No DKIM-Signature header found.");
      }

      if (authResults) {
        const lower = authResults.toLowerCase();
        let authSummary = [];
        authSummary.push(lower.includes("spf=pass") ? "SPF pass" : (lower.includes("spf=fail") ? "SPF fail" : "SPF unknown"));
        authSummary.push(lower.includes("dkim=pass") ? "DKIM pass" : (lower.includes("dkim=fail") ? "DKIM fail" : "DKIM unknown"));
        authSummary.push(lower.includes("dmarc=pass") ? "DMARC pass" : (lower.includes("dmarc=fail") ? "DMARC fail" : "DMARC unknown"));

        const bad = authSummary.some(x => x.includes("fail"));
        output += addCard("Authentication Results", bad ? "bad" : "good", `${authSummary.join(" · ")}<br><br><code>${authResults}</code>`);
      } else {
        output += addCard("Authentication Results", "warn", "No Authentication-Results header found.");
      }

      const receivedMatches = raw.match(/^Received:.*$/gim) || [];
      output += addCard("Received Hops", "good", `Detected ${receivedMatches.length} Received header(s). This can help trace message routing.`);

      if (from && returnPath && from.toLowerCase() !== returnPath.toLowerCase()) {
        output += addCard("From vs Return-Path", "warn", "The visible From address and Return-Path do not match exactly. That is not always malicious, but it is worth reviewing.");
      }

      results.innerHTML = output;
      status.innerText = "Analysis complete.";
    }

    function loadExample() {
      document.getElementById("headersInput").value = `From: Example Sender <alerts@example.com>
Return-Path: <bounce@example.com>
Subject: Security Alert
Message-ID: <12345@example.com>
Received-SPF: pass (google.com: domain of alerts@example.com designates 192.0.2.10 as permitted sender)
Authentication-Results: mx.google.com; spf=pass smtp.mailfrom=example.com; dkim=pass header.d=example.com; dmarc=pass
DKIM-Signature: v=1; a=rsa-sha256; d=example.com; s=mail; bh=abc123;
Received: from mail.example.com (mail.example.com [192.0.2.10]) by mx.google.com with ESMTPS id abc123;
Received: by mail.example.com with SMTP id xyz789;`;
      document.getElementById("results").innerHTML = "";
      document.getElementById("status").innerText = "";
    }

    function clearHeaders() {
      document.getElementById("headersInput").value = "";
      document.getElementById("results").innerHTML = "";
      document.getElementById("status").innerText = "";
    }
  </script>
</body>
</html>
