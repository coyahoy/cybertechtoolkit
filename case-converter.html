<!DOCTYPE html>
<html>
<head>
  <title>Case Converter - CyberTechToolkit</title>
  <style>
    body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>Case Converter</h1>

  <div class="box">
    <div class="label">Input</div>
    <textarea id="textInput" placeholder="Enter text here"></textarea>

    <div style="text-align:center;">
      <button onclick="convertCase('upper')">UPPERCASE</button>
      <button onclick="convertCase('lower')">lowercase</button>
      <button onclick="convertCase('title')">Title Case</button>
      <button onclick="convertCase('camel')">camelCase</button>
      <button onclick="convertCase('snake')">snake_case</button>
      <button onclick="convertCase('kebab')">kebab-case</button>
      <button onclick="copyOutput()">Copy Output</button>
    </div>

    <div class="status" id="status"></div>

    <div class="output">
      <div class="label">Output</div>
      <pre id="textOutput">Converted text will appear here</pre>
    </div>
  </div>

  <script>
    function wordsFromText(text) {
      return text
        .trim()
        .replace(/[_-]+/g, " ")
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .split(/\s+/)
        .filter(Boolean);
    }

    function toTitleCase(words) {
      return words
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    function convertCase(type) {
      const input = document.getElementById("textInput").value;
      const output = document.getElementById("textOutput");
      const status = document.getElementById("status");

      if (!input.trim()) {
        output.innerText = "Converted text will appear here";
        status.innerText = "Please enter text first.";
        return;
      }

      const words = wordsFromText(input);
      let result = "";

      switch (type) {
        case "upper":
          result = input.toUpperCase();
          break;
        case "lower":
          result = input.toLowerCase();
          break;
        case "title":
          result = toTitleCase(words);
          break;
        case "camel":
          result = words
            .map((word, index) =>
              index === 0
                ? word.toLowerCase()
                : word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            )
            .join("");
          break;
        case "snake":
          result = words.map(word => word.toLowerCase()).join("_");
          break;
        case "kebab":
          result = words.map(word => word.toLowerCase()).join("-");
          break;
      }

      output.innerText = result;
      status.innerText = "Conversion complete.";
    }

    async function copyOutput() {
      const output = document.getElementById("textOutput").innerText;
      const status = document.getElementById("status");

      if (!output || output === "Converted text will appear here") {
        status.innerText = "Nothing to copy yet.";
        return;
      }

      try {
        await navigator.clipboard.writeText(output);
        status.innerText = "Output copied to clipboard.";
      } catch {
        status.innerText = "Could not copy output.";
      }
    }
  </script>

</body>
</html>
