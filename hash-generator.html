<!DOCTYPE html>
<html>
<head>
  <title>Hash Generator | CyberTechToolkit</title>
  <meta name="description" content="Generate SHA-1, SHA-256, SHA-384, and SHA-512 hashes for quick integrity and security analysis tasks.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
        linear-gradient(180deg, #060d18 0%, #08111f 35%, #0b1220 100%);
      color: #e5eefc;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 34px;
    }

    .back {
      position: absolute;
      left: 20px;
      top: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(12,20,35,0.9);
      border: 1px solid rgba(53,74,102,0.7);
      padding: 25px;
      border-radius: 16px;
      width: 950px;
      max-width: 96%;
      margin: auto;
      text-align: left;
      box-sizing: border-box;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 18px;
      margin-bottom: 8px;
    }

    textarea,
    select {
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      background: #f8fafc;
      color: #0f172a;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: monospace;
    }

    select {
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 14px;
      padding: 10px 16px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      color: #08111f;
    }

    button:hover {
      background: #00e5c0;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .status {
      color: #9ca3af;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .result-box {
      margin-top: 22px;
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 18px;
      border-radius: 12px;
    }

    .result-label {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result {
      color: #00ffd5;
      word-break: break-all;
      font-family: Consolas, Monaco, monospace;
      font-size: 15px;
      line-height: 1.7;
      min-height: 24px;
    }

    .note {
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 18px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 28px;
      }

      .box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

<div class="back">
  <a href="/">← Back</a>
</div>

<h1>Hash Generator</h1>

<div class="box">
  <div class="label">Enter Text</div>
  <textarea id="input" placeholder="Type text to hash..."></textarea>

  <div class="label">Algorithm</div>
  <select id="algorithm">
    <option value="SHA-1">SHA-1</option>
    <option value="SHA-256" selected>SHA-256</option>
    <option value="SHA-384">SHA-384</option>
    <option value="SHA-512">SHA-512</option>
  </select>

  <div class="controls">
    <button onclick="generateHash()">Generate Hash</button>
    <button onclick="loadExample()">Load Example</button>
    <button onclick="copyOutput()">Copy Hash</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="status" id="status">Enter text and select a hash algorithm.</div>

  <div class="result-box">
    <div class="result-label">Output</div>
    <div class="result" id="output">Your hash will appear here</div>
  </div>

  <div class="note">
    Browser-based hashing supports SHA algorithms here. MD5 is not included in this version because the Web Crypto API does not support it directly.
  </div>
</div>

<script>
  async function generateHash() {
    const text = document.getElementById("input").value;
    const algorithm = document.getElementById("algorithm").value;
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    if (!text) {
      output.innerText = "Please enter some text.";
      status.innerText = "No input provided.";
      return;
    }

    try {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest(algorithm, data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
      output.innerText = hashHex;
      status.innerText = `${algorithm} hash generated successfully.`;
    } catch (error) {
      output.innerText = "Error generating hash.";
      status.innerText = "Hash generation failed.";
    }
  }

  function loadExample() {
    document.getElementById("input").value = "CyberTechToolkit";
    document.getElementById("algorithm").value = "SHA-256";
    document.getElementById("status").innerText = "Example loaded.";
    generateHash();
  }

  async function copyOutput() {
    const output = document.getElementById("output").innerText;
    const status = document.getElementById("status");

    if (!output || output === "Your hash will appear here" || output === "Please enter some text." || output === "Error generating hash.") {
      status.innerText = "Nothing valid to copy yet.";
      return;
    }

    try {
      await navigator.clipboard.writeText(output);
      status.innerText = "Hash copied to clipboard.";
    } catch {
      status.innerText = "Could not copy hash.";
    }
  }

  function clearAll() {
    document.getElementById("input").value = "";
    document.getElementById("algorithm").value = "SHA-256";
    document.getElementById("output").innerText = "Your hash will appear here";
    document.getElementById("status").innerText = "Cleared.";
  }
</script>

</body>
</html>
