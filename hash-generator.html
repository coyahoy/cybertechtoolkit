<!DOCTYPE html>
<html>
<head>
  <title>Hash Generator - CyberTechToolkit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 30px;
      width: 520px;
      max-width: 92%;
      box-sizing: border-box;
      text-align: left;
    }

    .label {
      color: #9ca3af;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 18px;
    }

    textarea {
      width: 100%;
      height: 110px;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 15px;
      resize: vertical;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ffd5;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 18px;
    }

    .result-box {
      margin-top: 22px;
      background: #0f172a;
      padding: 16px;
      border-radius: 10px;
    }

    .result-label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result {
      color: #00ffd5;
      word-break: break-all;
      font-family: monospace;
      font-size: 15px;
    }

    .note {
      color: #9ca3af;
      font-size: 13px;
      margin-top: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>Hash Generator</h1>

  <div class="box">
    <div class="label">Enter Text</div>
    <textarea id="input" placeholder="Type text to hash..."></textarea>

    <div class="label">Algorithm</div>
    <select id="algorithm">
      <option value="SHA-1">SHA-1</option>
      <option value="SHA-256" selected>SHA-256</option>
      <option value="SHA-384">SHA-384</option>
      <option value="SHA-512">SHA-512</option>
    </select>

    <button onclick="generateHash()">Generate Hash</button>

    <div class="result-box">
      <div class="result-label">Output</div>
      <div class="result" id="output">Your hash will appear here</div>
    </div>

    <div class="note">
      Browser-based hashing supports SHA algorithms here. MD5 is intentionally not included in this version because the Web Crypto API does not support it.
    </div>
  </div>

  <script>
    async function generateHash() {
      const text = document.getElementById("input").value;
      const algorithm = document.getElementById("algorithm").value;
      const output = document.getElementById("output");

      if (!text) {
        output.innerText = "Please enter some text.";
        return;
      }

      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const hashBuffer = await crypto.subtle.digest(algorithm, data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
        output.innerText = hashHex;
      } catch (error) {
        output.innerText = "Error generating hash.";
      }
    }
  </script>

</body>
</html>
