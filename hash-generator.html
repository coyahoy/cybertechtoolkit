<!DOCTYPE html>
<html>
<head>
  <title>Hash Generator - CyberTechToolkit</title>
  <style>
    body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>Hash Generator</h1>

  <div class="box">
    <div class="label">Enter Text</div>
    <textarea id="input" placeholder="Type text to hash..."></textarea>

    <div class="label">Algorithm</div>
    <select id="algorithm">
      <option value="SHA-1">SHA-1</option>
      <option value="SHA-256" selected>SHA-256</option>
      <option value="SHA-384">SHA-384</option>
      <option value="SHA-512">SHA-512</option>
    </select>

    <button onclick="generateHash()">Generate Hash</button>

    <div class="result-box">
      <div class="result-label">Output</div>
      <div class="result" id="output">Your hash will appear here</div>
    </div>

    <div class="note">
      Browser-based hashing supports SHA algorithms here. MD5 is intentionally not included in this version because the Web Crypto API does not support it.
    </div>
  </div>

  <script>
    async function generateHash() {
      const text = document.getElementById("input").value;
      const algorithm = document.getElementById("algorithm").value;
      const output = document.getElementById("output");

      if (!text) {
        output.innerText = "Please enter some text.";
        return;
      }

      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const hashBuffer = await crypto.subtle.digest(algorithm, data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
        output.innerText = hashHex;
      } catch (error) {
        output.innerText = "Error generating hash.";
      }
    }
  </script>

</body>
</html>
