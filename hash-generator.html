<!DOCTYPE html>
<html>
<head>
<title>Hash Generator - CyberTechToolkit</title>

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#00ffd5;
}

.back{
position:absolute;
top:20px;
left:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.box{
background:#111827;
padding:30px;
border-radius:10px;
display:inline-block;
margin-top:30px;
width:420px;
}

textarea{
width:100%;
height:90px;
border-radius:6px;
border:none;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
background:#00ffd5;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

.result{
margin-top:20px;
word-break:break-all;
color:#00ffd5;
}

</style>

</head>

<body>

<div class="back">
<a href="/">← Back to CyberTechToolkit</a>
</div>

<h1>Hash Generator</h1>

<div class="box">

Enter text to hash

<textarea id="input"></textarea>

<button onclick="generateHash()">Generate SHA-256</button>

<div class="result" id="output"></div>

</div>

<script>

async function generateHash(){

const text = document.getElementById("input").value;

const encoder = new TextEncoder();
const data = encoder.encode(text);

const hashBuffer = await crypto.subtle.digest("SHA-256", data);

const hashArray = Array.from(new Uint8Array(hashBuffer));

const hashHex = hashArray
.map(b => b.toString(16).padStart(2,"0"))
.join("");

document.getElementById("output").innerText = hashHex;

}

</script>

</body>
</html>
