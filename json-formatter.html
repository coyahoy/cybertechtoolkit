<!DOCTYPE html>
<html>
<head>
  <title>JSON Formatter | CyberTechToolkit</title>
  <meta name="description" content="Format, validate, and minify JSON instantly in your browser.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
        linear-gradient(180deg, #060d18 0%, #08111f 35%, #0b1220 100%);
      color: #e5eefc;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 34px;
    }

    .back {
      position: absolute;
      left: 20px;
      top: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(12,20,35,0.9);
      border: 1px solid rgba(53,74,102,0.7);
      padding: 25px;
      border-radius: 16px;
      width: 1000px;
      max-width: 96%;
      margin: auto;
      text-align: left;
      box-sizing: border-box;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 18px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      resize: vertical;
      font-family: monospace;
      background: #f8fafc;
      color: #0f172a;
    }

    button {
      margin-top: 14px;
      padding: 10px 16px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      color: #08111f;
    }

    button:hover {
      background: #00e5c0;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .status {
      color: #9ca3af;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .result-box {
      margin-top: 22px;
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 18px;
      border-radius: 12px;
    }

    .result-label {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result {
      color: #e5e7eb;
      word-break: break-word;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 24px;
    }

    .good {
      color: #22c55e;
    }

    .bad {
      color: #ef4444;
    }

    .note {
      color: #94a3b8;
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 28px;
      }

      .box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

<div class="back">
  <a href="/">← Back</a>
</div>

<h1>JSON Formatter</h1>

<div class="box">

  <div class="label">Input JSON</div>
  <textarea id="inputJson" placeholder='{"name":"Coy","role":"analyst","active":true}'></textarea>

  <div class="controls">
    <button onclick="formatJson()">Format</button>
    <button onclick="minifyJson()">Minify</button>
    <button onclick="validateJson()">Validate</button>
    <button onclick="loadExample()">Load Example</button>
    <button onclick="copyOutput()">Copy Output</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="status" id="status">Paste JSON to format, minify, or validate it.</div>

  <div class="result-box">
    <div class="result-label">Output</div>
    <div class="result" id="output">Your JSON result will appear here.</div>
  </div>

  <div class="note">
    This tool parses JSON directly in your browser and helps with readability, validation, and compact output for debugging or development work.
  </div>

</div>

<script>
  function getInput() {
    return document.getElementById("inputJson").value.trim();
  }

  function setOutput(text) {
    document.getElementById("output").textContent = text;
  }

  function setStatus(text) {
    document.getElementById("status").innerText = text;
  }

  function formatJson() {
    const input = getInput();

    if (!input) {
      setOutput("Please enter JSON first.");
      setStatus("No input provided.");
      return;
    }

    try {
      const parsed = JSON.parse(input);
      setOutput(JSON.stringify(parsed, null, 2));
      setStatus("JSON formatted successfully.");
    } catch (error) {
      setOutput("Invalid JSON.");
      setStatus("Formatting failed.");
    }
  }

  function minifyJson() {
    const input = getInput();

    if (!input) {
      setOutput("Please enter JSON first.");
      setStatus("No input provided.");
      return;
    }

    try {
      const parsed = JSON.parse(input);
      setOutput(JSON.stringify(parsed));
      setStatus("JSON minified successfully.");
    } catch (error) {
      setOutput("Invalid JSON.");
      setStatus("Minify failed.");
    }
  }

  function validateJson() {
    const input = getInput();

    if (!input) {
      setOutput("Please enter JSON first.");
      setStatus("No input provided.");
      return;
    }

    try {
      JSON.parse(input);
      setOutput("Valid JSON.");
      setStatus("Validation complete.");
    } catch (error) {
      setOutput("Invalid JSON.\n\n" + error.message);
      setStatus("Validation failed.");
    }
  }

  function loadExample() {
    document.getElementById("inputJson").value = `{
  "name": "Coy",
  "role": "Cybersecurity Student",
  "tools": ["DNS Lookup", "JWT Inspector", "Encoding Playground"],
  "active": true
}`;
    setOutput("Your JSON result will appear here.");
    setStatus("Example loaded.");
  }

  async function copyOutput() {
    const output = document.getElementById("output").innerText;

    if (!output || output === "Your JSON result will appear here." || output === "Please enter JSON first.") {
      setStatus("Nothing valid to copy yet.");
      return;
    }

    try {
      await navigator.clipboard.writeText(output);
      setStatus("Output copied to clipboard.");
    } catch {
      setStatus("Could not copy output.");
    }
  }

  function clearAll() {
    document.getElementById("inputJson").value = "";
    setOutput("Your JSON result will appear here.");
    setStatus("Cleared.");
  }
</script>

</body>
</html>
