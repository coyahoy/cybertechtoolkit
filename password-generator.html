<!DOCTYPE html>
<html>
<head>
  <title>Password Generator | CyberTechToolkit</title>
  <meta name="description" content="Generate strong random passwords with adjustable length and character options.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
        linear-gradient(180deg, #060d18 0%, #08111f 35%, #0b1220 100%);
      color: #e5eefc;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 34px;
    }

    .back {
      position: absolute;
      left: 20px;
      top: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(12,20,35,0.9);
      border: 1px solid rgba(53,74,102,0.7);
      padding: 25px;
      border-radius: 16px;
      width: 950px;
      max-width: 96%;
      margin: auto;
      text-align: left;
      box-sizing: border-box;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 18px;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      background: #f8fafc;
      color: #0f172a;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .option-card {
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 14px;
      border-radius: 12px;
    }

    .option-card label {
      color: #e5eefc;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      transform: scale(1.1);
      accent-color: #00ffd5;
    }

    button {
      margin-top: 14px;
      padding: 10px 16px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      color: #08111f;
    }

    button:hover {
      background: #00e5c0;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .status {
      color: #9ca3af;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .result-box {
      margin-top: 22px;
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 18px;
      border-radius: 12px;
    }

    .result-label {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result {
      color: #00ffd5;
      word-break: break-all;
      font-family: Consolas, Monaco, monospace;
      font-size: 18px;
      line-height: 1.7;
      min-height: 28px;
    }

    .note {
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 18px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 28px;
      }

      .box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

<div class="back">
  <a href="/">← Back</a>
</div>

<h1>Password Generator</h1>

<div class="box">
  <div class="label">Password Length</div>
  <input type="number" id="length" min="4" max="128" value="16">

  <div class="label">Character Options</div>
  <div class="options">
    <div class="option-card">
      <label><input type="checkbox" id="uppercase" checked> Uppercase Letters</label>
    </div>
    <div class="option-card">
      <label><input type="checkbox" id="lowercase" checked> Lowercase Letters</label>
    </div>
    <div class="option-card">
      <label><input type="checkbox" id="numbers" checked> Numbers</label>
    </div>
    <div class="option-card">
      <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>
  </div>

  <div class="controls">
    <button onclick="generatePassword()">Generate Password</button>
    <button onclick="copyPassword()">Copy Password</button>
    <button onclick="loadExample()">Load Example</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="status" id="status">Choose options and generate a strong password.</div>

  <div class="result-box">
    <div class="result-label">Generated Password</div>
    <div class="result" id="password">Your password will appear here</div>
  </div>

  <div class="note">
    Passwords are generated in your browser using secure randomness. Longer passwords with a mix of character types are generally stronger.
  </div>
</div>

<script>
  const usedPasswords = new Set();

  function generatePassword() {
    const length = parseInt(document.getElementById("length").value, 10);
    const useUpper = document.getElementById("uppercase").checked;
    const useLower = document.getElementById("lowercase").checked;
    const useNumbers = document.getElementById("numbers").checked;
    const useSymbols = document.getElementById("symbols").checked;
    const output = document.getElementById("password");
    const status = document.getElementById("status");

    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()-_=+[]{};:,.?/|~";

    let chars = "";
    if (useUpper) chars += upper;
    if (useLower) chars += lower;
    if (useNumbers) chars += numbers;
    if (useSymbols) chars += symbols;

    if (!chars) {
      output.innerText = "Select at least one option.";
      status.innerText = "No character set selected.";
      return;
    }

    if (isNaN(length) || length < 4 || length > 128) {
      output.innerText = "Choose a length between 4 and 128.";
      status.innerText = "Invalid password length.";
      return;
    }

    let password = "";
    let attempts = 0;

    do {
      password = "";
      const randomValues = new Uint32Array(length);
      crypto.getRandomValues(randomValues);

      for (let i = 0; i < length; i++) {
        password += chars[randomValues[i] % chars.length];
      }

      attempts++;
      if (attempts > 50) break;
    } while (usedPasswords.has(password));

    usedPasswords.add(password);
    output.innerText = password;
    status.innerText = "Password generated successfully.";
  }

  function loadExample() {
    document.getElementById("length").value = 20;
    document.getElementById("uppercase").checked = true;
    document.getElementById("lowercase").checked = true;
    document.getElementById("numbers").checked = true;
    document.getElementById("symbols").checked = true;
    document.getElementById("status").innerText = "Example settings loaded.";
    generatePassword();
  }

  async function copyPassword() {
    const password = document.getElementById("password").innerText;
    const status = document.getElementById("status");

    if (!password || password === "Your password will appear here" || password.includes("Select at least one option") || password.includes("Choose a length")) {
      status.innerText = "Nothing valid to copy yet.";
      return;
    }

    try {
      await navigator.clipboard.writeText(password);
      status.innerText = "Password copied to clipboard.";
    } catch {
      status.innerText = "Could not copy password.";
    }
  }

  function clearAll() {
    document.getElementById("length").value = 16;
    document.getElementById("uppercase").checked = true;
    document.getElementById("lowercase").checked = true;
    document.getElementById("numbers").checked = true;
    document.getElementById("symbols").checked = true;
    document.getElementById("password").innerText = "Your password will appear here";
    document.getElementById("status").innerText = "Cleared.";
  }
</script>

</body>
</html>
