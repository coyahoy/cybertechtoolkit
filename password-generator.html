<!DOCTYPE html>
<html>
<head>
  <title>Password Generator - CyberTechToolkit</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f19;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #00ffd5;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 30px;
      width: 320px;
    }

    input[type="number"] {
      width: 80px;
      padding: 8px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    label {
      display: block;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ffd5;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    #password {
      margin-top: 20px;
      font-size: 20px;
      word-break: break-word;
      color: #00ffd5;
    }
  </style>
</head>
<body>
<div style="position:absolute;top:20px;left:20px;">
<a href="/" style="color:#00ffd5;text-decoration:none;font-weight:bold;">
← Back to CyberTechToolkit
</a>
</div>
  <h1>Password Generator</h1>

  <div class="box">
    <p>Create a secure password</p>

    <label>
      Length:
      <input type="number" id="length" value="14" min="4" max="64">
    </label>

    <label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>
    <label><input type="checkbox" id="lowercase" checked> Include Lowercase</label>
    <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
    <label><input type="checkbox" id="symbols" checked> Include Symbols</label>

    <button onclick="generatePassword()">Generate Password</button>

    <div id="password">Your password will appear here</div>
  </div>

  <script>
    const usedPasswords = new Set();

    function generatePassword() {
      const length = parseInt(document.getElementById("length").value);
      const useUpper = document.getElementById("uppercase").checked;
      const useLower = document.getElementById("lowercase").checked;
      const useNumbers = document.getElementById("numbers").checked;
      const useSymbols = document.getElementById("symbols").checked;

      const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const lower = "abcdefghijklmnopqrstuvwxyz";
      const numbers = "0123456789";
      const symbols = "!@#$%^&*()_+[]{}<>?/|";

      let chars = "";

      if (useUpper) chars += upper;
      if (useLower) chars += lower;
      if (useNumbers) chars += numbers;
      if (useSymbols) chars += symbols;

      if (chars === "") {
        document.getElementById("password").innerText = "Select at least one option.";
        return;
      }

      let password = "";

      do {
        password = "";
        const randomValues = new Uint32Array(length);
        crypto.getRandomValues(randomValues);

        for (let i = 0; i < length; i++) {
          password += chars[randomValues[i] % chars.length];
        }
      } while (usedPasswords.has(password));

      usedPasswords.add(password);
      document.getElementById("password").innerText = password;
    }
  </script>

</body>
</html>
