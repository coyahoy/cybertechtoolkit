<!DOCTYPE html>
<html>
<head>
  <title>URL Encoder / Decoder - CyberTechToolkit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 30px;
      width: 700px;
      max-width: 94%;
      box-sizing: border-box;
      text-align: left;
    }

    .label {
      color: #9ca3af;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 18px;
    }

    textarea {
      width: 100%;
      height: 150px;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      resize: vertical;
      font-family: monospace;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ffd5;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 18px;
      margin-right: 10px;
    }

    .status {
      margin-top: 16px;
      color: #9ca3af;
      text-align: center;
    }

    .output {
      margin-top: 20px;
      background: #0f172a;
      padding: 16px;
      border-radius: 10px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #00ffd5;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>URL Encoder / Decoder</h1>

  <div class="box">
    <div class="label">Input</div>
    <textarea id="urlInput" placeholder="Enter text or a URL here"></textarea>

    <div style="text-align:center;">
      <button onclick="encodeURL()">Encode</button>
      <button onclick="decodeURL()">Decode</button>
      <button onclick="copyOutput()">Copy Output</button>
    </div>

    <div class="status" id="status"></div>

    <div class="output">
      <div class="label">Output</div>
      <pre id="urlOutput">Encoded or decoded text will appear here</pre>
    </div>
  </div>

  <script>
    function encodeURL() {
      const input = document.getElementById("urlInput").value;
      const output = document.getElementById("urlOutput");
      const status = document.getElementById("status");

      if (!input.trim()) {
        status.innerText = "Please enter text first.";
        output.innerText = "Encoded or decoded text will appear here";
        return;
      }

      try {
        output.innerText = encodeURIComponent(input);
        status.innerText = "Text encoded successfully.";
      } catch (error) {
        output.innerText = "Could not encode input.";
        status.innerText = "Encoding failed.";
      }
    }

    function decodeURL() {
      const input = document.getElementById("urlInput").value;
      const output = document.getElementById("urlOutput");
      const status = document.getElementById("status");

      if (!input.trim()) {
        status.innerText = "Please enter text first.";
        output.innerText = "Encoded or decoded text will appear here";
        return;
      }

      try {
        output.innerText = decodeURIComponent(input);
        status.innerText = "Text decoded successfully.";
      } catch (error) {
        output.innerText = "Invalid encoded URL text.";
        status.innerText = "Decoding failed. Check the input.";
      }
    }

    async function copyOutput() {
      const output = document.getElementById("urlOutput").innerText;
      const status = document.getElementById("status");

      if (!output || output === "Encoded or decoded text will appear here" || output === "Invalid encoded URL text.") {
        status.innerText = "Nothing valid to copy yet.";
        return;
      }

      try {
        await navigator.clipboard.writeText(output);
        status.innerText = "Output copied to clipboard.";
      } catch (error) {
        status.innerText = "Could not copy output.";
      }
    }
  </script>

</body>
</html>
