<!DOCTYPE html>
<html>
<head>
  <title>What Is My IP - CyberTechToolkit</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f19;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #00ffd5;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-link a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 30px;
      min-width: 340px;
    }

    .label {
      color: #9ca3af;
      margin-top: 15px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .value {
      font-size: 22px;
      color: #00ffd5;
      margin-top: 5px;
      word-break: break-word;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ffd5;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 25px;
      margin-right: 10px;
    }

    .note {
      color: #9ca3af;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="back-link">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>What Is My IP</h1>

  <div class="box">
    <div class="label">IPv4 Address</div>
    <div class="value" id="ipv4">Loading...</div>

    <div class="label">IPv6 Address</div>
    <div class="value" id="ipv6">Loading...</div>

    <div class="label">City</div>
    <div class="value" id="city">Loading...</div>

    <div class="label">Region</div>
    <div class="value" id="region">Loading...</div>

    <div class="label">Country</div>
    <div class="value" id="country">Loading...</div>

    <div class="label">ISP</div>
    <div class="value" id="isp">Loading...</div>

    <button onclick="getIPInfo()">Refresh</button>
    <button onclick="copyBestIP()">Copy IP</button>

    <div class="note">Detected using public IP lookups</div>
  </div>

  <script>
    async function getIPv4() {
      try {
        const response = await fetch("https://api.ipify.org?format=json");
        const data = await response.json();
        return data.ip || "Unavailable";
      } catch {
        return "Unavailable";
      }
    }

    async function getIPv6() {
      try {
        const response = await fetch("https://api64.ipify.org?format=json");
        const data = await response.json();
        return data.ip || "Unavailable";
      } catch {
        return "Unavailable";
      }
    }

    async function getLocationInfo() {
      try {
        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();
        return {
          city: data.city || "Unavailable",
          region: data.region || "Unavailable",
          country: data.country_name || "Unavailable",
          isp: data.org || "Unavailable"
        };
      } catch {
        return {
          city: "Unavailable",
          region: "Unavailable",
          country: "Unavailable",
          isp: "Unavailable"
        };
      }
    }

    async function getIPInfo() {
      document.getElementById("ipv4").innerText = "Loading...";
      document.getElementById("ipv6").innerText = "Loading...";
      document.getElementById("city").innerText = "Loading...";
      document.getElementById("region").innerText = "Loading...";
      document.getElementById("country").innerText = "Loading...";
      document.getElementById("isp").innerText = "Loading...";

      const [ipv4, ipv6, location] = await Promise.all([
        getIPv4(),
        getIPv6(),
        getLocationInfo()
      ]);

      document.getElementById("ipv4").innerText = ipv4;
      document.getElementById("ipv6").innerText = ipv6;
      document.getElementById("city").innerText = location.city;
      document.getElementById("region").innerText = location.region;
      document.getElementById("country").innerText = location.country;
      document.getElementById("isp").innerText = location.isp;
    }

    async function copyBestIP() {
      const ipv6 = document.getElementById("ipv6").innerText;
      const ipv4 = document.getElementById("ipv4").innerText;
      const bestIP = ipv6 !== "Unavailable" && ipv6 !== "Loading..." ? ipv6 : ipv4;

      try {
        await navigator.clipboard.writeText(bestIP);
        alert("IP copied: " + bestIP);
      } catch {
        alert("Could not copy IP.");
      }
    }

    getIPInfo();
  </script>

</body>
</html>
