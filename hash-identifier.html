<!DOCTYPE html>
<html>
<head>
<title>Hash Identifier | CyberTechToolkit</title>
<meta name="description" content="Identify common hash types such as MD5, SHA1, SHA256, SHA512 and others based on hash length and structure.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
padding:40px 20px;
margin:0;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
margin-bottom:20px;
font-size:34px;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:16px;
width:900px;
max-width:96%;
margin:auto;
text-align:left;
box-shadow:0 14px 30px rgba(0,0,0,0.24);
}

.label{
color:#9ca3af;
font-size:13px;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:8px;
}

textarea{
width:100%;
min-height:120px;
border-radius:8px;
border:none;
padding:12px;
box-sizing:border-box;
font-size:14px;
resize:vertical;
font-family:monospace;
background:#f8fafc;
color:#0f172a;
}

button{
margin-top:14px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
color:#08111f;
}

button:hover{
background:#00e5c0;
}

.controls{
text-align:center;
margin-top:20px;
}

.status{
color:#9ca3af;
margin-top:14px;
text-align:center;
}

.results{
margin-top:22px;
background:#0f172a;
border:1px solid #1f2937;
padding:18px;
border-radius:12px;
}

.result{
font-family:Consolas,monospace;
margin-bottom:10px;
}

.good{
color:#22c55e;
}

.note{
color:#94a3b8;
margin-top:18px;
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="back">
<a href="/">← Back</a>
</div>

<h1>Hash Identifier</h1>

<div class="box">

<div class="label">Paste Hash</div>

<textarea id="hashInput" placeholder="Enter a hash here..."></textarea>

<div class="controls">
<button onclick="identify()">Identify Hash</button>
<button onclick="example()">Example</button>
<button onclick="clearHash()">Clear</button>
</div>

<div class="status" id="status">Enter a hash to identify possible algorithms.</div>

<div class="results" id="results">
Possible hash types will appear here.
</div>

<div class="note">
This tool identifies possible hash types based on length and formatting. Some hashes share the same length, so results may include multiple possible algorithms.
</div>

</div>

<script>

function identify(){

const hash=document.getElementById("hashInput").value.trim();
const results=document.getElementById("results");
const status=document.getElementById("status");

if(!hash){
status.innerText="Enter a hash.";
return;
}

const len=hash.length;

let types=[];

if(len===32) types.push("MD5");
if(len===40) types.push("SHA-1");
if(len===64) types.push("SHA-256");
if(len===96) types.push("SHA-384");
if(len===128) types.push("SHA-512");

if(len===16) types.push("MySQL Hash");

if(types.length===0){
results.innerHTML="Unknown or uncommon hash type.";
}else{

let output="";

types.forEach(t=>{
output+=`<div class="result good">${t}</div>`;
});

results.innerHTML=output;

}

status.innerText="Hash analysis complete.";

}

function example(){

document.getElementById("hashInput").value="5d41402abc4b2a76b9719d911017c592";
document.getElementById("status").innerText="Example loaded.";

}

function clearHash(){

document.getElementById("hashInput").value="";
document.getElementById("results").innerText="Possible hash types will appear here.";
document.getElementById("status").innerText="Cleared.";

}

</script>

</body>
</html>
