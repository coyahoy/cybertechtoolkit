<!DOCTYPE html>
<html>
<head>
<title>DNS Lookup | CyberTechToolkit</title>
<meta name="description" content="Lookup DNS records including A, AAAA, MX, NS and TXT records.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
padding:40px 20px;
margin:0;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
margin-bottom:20px;
font-size:34px;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:16px;
width:900px;
max-width:96%;
margin:auto;
text-align:left;
box-shadow:0 14px 30px rgba(0,0,0,0.24);
}

.label{
color:#9ca3af;
font-size:13px;
text-transform:uppercase;
letter-spacing:1px;
margin-top:18px;
margin-bottom:8px;
}

input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
box-sizing:border-box;
font-size:14px;
background:#f8fafc;
color:#0f172a;
}

button{
margin-top:14px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
color:#08111f;
}

button:hover{
background:#00e5c0;
}

.controls{
text-align:center;
margin-top:20px;
}

.status{
color:#9ca3af;
margin-top:14px;
text-align:center;
font-size:14px;
}

.results{
margin-top:22px;
background:#0f172a;
border:1px solid #1f2937;
padding:16px;
border-radius:12px;
}

pre{
color:#e5e7eb;
white-space:pre-wrap;
word-break:break-word;
font-family:Consolas, Monaco, monospace;
font-size:14px;
}

</style>
</head>

<body>

<div class="back">
<a href="/">← Back</a>
</div>

<h1>DNS Lookup</h1>

<div class="box">

<div class="label">Domain</div>
<input id="domain" placeholder="example.com">

<div class="label">Record Type</div>
<select id="type">
<option value="A">A</option>
<option value="AAAA">AAAA</option>
<option value="MX">MX</option>
<option value="TXT">TXT</option>
<option value="NS">NS</option>
</select>

<div class="controls">
<button onclick="lookup()">Lookup</button>
<button onclick="loadExample()">Example</button>
<button onclick="clearResults()">Clear</button>
</div>

<div class="status" id="status">Enter a domain and select a DNS record type.</div>

<div class="results">
<pre id="output">Results will appear here.</pre>
</div>

</div>

<script>

async function lookup(){

const domain=document.getElementById("domain").value.trim();
const type=document.getElementById("type").value;
const status=document.getElementById("status");
const output=document.getElementById("output");

if(!domain){
status.innerText="Enter a domain.";
return;
}

try{

const url=`https://dns.google/resolve?name=${domain}&type=${type}`;
const res=await fetch(url);
const data=await res.json();

if(!data.Answer){
output.innerText="No records found.";
return;
}

let text="";
data.Answer.forEach(r=>{
text+=`${r.data}\n`;
});

output.innerText=text;
status.innerText="Lookup complete.";

}catch{
status.innerText="Lookup failed.";
}

}

function loadExample(){
document.getElementById("domain").value="google.com";
document.getElementById("type").value="A";
}

function clearResults(){
document.getElementById("domain").value="";
document.getElementById("output").innerText="Results will appear here.";
document.getElementById("status").innerText="Cleared.";
}

</script>

</body>
</html>
