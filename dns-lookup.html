<!DOCTYPE html>
<html>
<head>
  <title>DNS Lookup - CyberTechToolkit</title>
  <style>
    body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>DNS Lookup</h1>

  <div class="box">
    <p>Enter a domain name</p>
    <input type="text" id="domain" placeholder="example.com" />
    <button onclick="lookupDNS()">Lookup DNS</button>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
  </div>

  <script>
    async function fetchRecord(domain, type) {
      try {
        const response = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${type}`);
        const data = await response.json();
        return data.Answer || [];
      } catch {
        return [];
      }
    }

    function renderSection(title, records) {
      if (!records.length) {
        return `
          <div class="section">
            <h3>${title}</h3>
            <div class="record">No records found</div>
          </div>
        `;
      }

      const items = records.map(record => `<div class="record">${record.data}</div>`).join("");
      return `
        <div class="section">
          <h3>${title}</h3>
          ${items}
        </div>
      `;
    }

    async function lookupDNS() {
      const domain = document.getElementById("domain").value.trim();
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      if (!domain) {
        status.innerText = "Please enter a domain name.";
        results.innerHTML = "";
        return;
      }

      status.innerText = "Looking up DNS records...";
      results.innerHTML = "";

      const [aRecords, aaaaRecords, mxRecords, nsRecords, txtRecords] = await Promise.all([
        fetchRecord(domain, "A"),
        fetchRecord(domain, "AAAA"),
        fetchRecord(domain, "MX"),
        fetchRecord(domain, "NS"),
        fetchRecord(domain, "TXT")
      ]);

      results.innerHTML =
        renderSection("A Records", aRecords) +
        renderSection("AAAA Records", aaaaRecords) +
        renderSection("MX Records", mxRecords) +
        renderSection("NS Records", nsRecords) +
        renderSection("TXT Records", txtRecords);

      status.innerText = "Lookup complete.";
    }
  </script>

</body>
</html>
