<!DOCTYPE html>
<html>
<head>
  <title>DNS Lookup | CyberTechToolkit</title>
  <meta name="description" content="Lookup A, AAAA, MX, TXT, and NS DNS records for a domain.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
        linear-gradient(180deg, #060d18 0%, #08111f 35%, #0b1220 100%);
      color: #e5eefc;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 34px;
    }

    .back {
      position: absolute;
      left: 20px;
      top: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(12,20,35,0.9);
      border: 1px solid rgba(53,74,102,0.7);
      padding: 25px;
      border-radius: 16px;
      width: 1000px;
      max-width: 96%;
      margin: auto;
      text-align: left;
      box-sizing: border-box;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 18px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
      background: #f8fafc;
      color: #0f172a;
    }

    button {
      margin-top: 14px;
      padding: 10px 16px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      color: #08111f;
    }

    button:hover {
      background: #00e5c0;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .status {
      color: #9ca3af;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 16px;
      border-radius: 12px;
      min-height: 120px;
    }

    .card-title {
      color: #00ffd5;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .record {
      color: #e5e7eb;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 6px;
    }

    .empty {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
    }

    .note {
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 20px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 28px;
      }

      .box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

<div class="back">
  <a href="/">← Back</a>
</div>

<h1>DNS Lookup</h1>

<div class="box">

  <div class="label">Domain</div>
  <input id="domain" placeholder="example.com">

  <div class="controls">
    <button onclick="lookup()">Lookup</button>
    <button onclick="loadExample()">Load Example</button>
    <button onclick="clearResults()">Clear</button>
  </div>

  <div class="status" id="status">Enter a domain to view common DNS record types.</div>

  <div class="results-grid" id="resultsGrid">
    <div class="card">
      <div class="card-title">Results</div>
      <div class="empty">DNS records will appear here.</div>
    </div>
  </div>

  <div class="note">
    This tool checks common DNS record types including A, AAAA, MX, TXT, and NS. Results are fetched directly in the browser.
  </div>

</div>

<script>
  async function fetchRecord(domain, type) {
    const url = `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${type}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.Answer || [];
  }

  function buildCard(title, records) {
    if (!records.length) {
      return `
        <div class="card">
          <div class="card-title">${title}</div>
          <div class="empty">No records found.</div>
        </div>
      `;
    }

    const lines = records.map(record => `<div class="record">${record.data}</div>`).join("");
    return `
      <div class="card">
        <div class="card-title">${title}</div>
        ${lines}
      </div>
    `;
  }

  async function lookup() {
    const domain = document.getElementById("domain").value.trim();
    const status = document.getElementById("status");
    const resultsGrid = document.getElementById("resultsGrid");

    if (!domain) {
      status.innerText = "Please enter a domain.";
      return;
    }

    status.innerText = "Looking up DNS records...";
    resultsGrid.innerHTML = "";

    try {
      const [aRecords, aaaaRecords, mxRecords, txtRecords, nsRecords] = await Promise.all([
        fetchRecord(domain, "A"),
        fetchRecord(domain, "AAAA"),
        fetchRecord(domain, "MX"),
        fetchRecord(domain, "TXT"),
        fetchRecord(domain, "NS")
      ]);

      resultsGrid.innerHTML =
        buildCard("A Records", aRecords) +
        buildCard("AAAA Records", aaaaRecords) +
        buildCard("MX Records", mxRecords) +
        buildCard("TXT Records", txtRecords) +
        buildCard("NS Records", nsRecords);

      status.innerText = "DNS lookup complete.";
    } catch (error) {
      resultsGrid.innerHTML = `
        <div class="card">
          <div class="card-title">Lookup Error</div>
          <div class="empty">Could not fetch DNS records.</div>
        </div>
      `;
      status.innerText = "Lookup failed.";
    }
  }

  function loadExample() {
    document.getElementById("domain").value = "google.com";
    document.getElementById("status").innerText = "Example loaded.";
  }

  function clearResults() {
    document.getElementById("domain").value = "";
    document.getElementById("status").innerText = "Cleared.";
    document.getElementById("resultsGrid").innerHTML = `
      <div class="card">
        <div class="card-title">Results</div>
        <div class="empty">DNS records will appear here.</div>
      </div>
    `;
  }
</script>

</body>
</html>
