<!DOCTYPE html>
<html>
<head>
  <title>DNS Lookup - CyberTechToolkit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 30px;
      width: 500px;
      max-width: 90%;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ffd5;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    .results {
      margin-top: 25px;
      text-align: left;
    }

    .section {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    .section h3 {
      color: #00ffd5;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .record {
      color: #d1d5db;
      margin: 6px 0;
      word-break: break-word;
      font-family: monospace;
      font-size: 14px;
    }

    .status {
      margin-top: 15px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>DNS Lookup</h1>

  <div class="box">
    <p>Enter a domain name</p>
    <input type="text" id="domain" placeholder="example.com" />
    <button onclick="lookupDNS()">Lookup DNS</button>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
  </div>

  <script>
    async function fetchRecord(domain, type) {
      try {
        const response = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${type}`);
        const data = await response.json();
        return data.Answer || [];
      } catch {
        return [];
      }
    }

    function renderSection(title, records) {
      if (!records.length) {
        return `
          <div class="section">
            <h3>${title}</h3>
            <div class="record">No records found</div>
          </div>
        `;
      }

      const items = records.map(record => `<div class="record">${record.data}</div>`).join("");
      return `
        <div class="section">
          <h3>${title}</h3>
          ${items}
        </div>
      `;
    }

    async function lookupDNS() {
      const domain = document.getElementById("domain").value.trim();
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      if (!domain) {
        status.innerText = "Please enter a domain name.";
        results.innerHTML = "";
        return;
      }

      status.innerText = "Looking up DNS records...";
      results.innerHTML = "";

      const [aRecords, aaaaRecords, mxRecords, nsRecords, txtRecords] = await Promise.all([
        fetchRecord(domain, "A"),
        fetchRecord(domain, "AAAA"),
        fetchRecord(domain, "MX"),
        fetchRecord(domain, "NS"),
        fetchRecord(domain, "TXT")
      ]);

      results.innerHTML =
        renderSection("A Records", aRecords) +
        renderSection("AAAA Records", aaaaRecords) +
        renderSection("MX Records", mxRecords) +
        renderSection("NS Records", nsRecords) +
        renderSection("TXT Records", txtRecords);

      status.innerText = "Lookup complete.";
    }
  </script>

</body>
</html>
