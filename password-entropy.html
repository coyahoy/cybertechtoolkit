<!DOCTYPE html>
<html>
<head>
  <title>Password Entropy Calculator | CyberTechToolkit</title>
  <meta name="description" content="Estimate password entropy, character set size, and brute-force resistance in your browser.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
        linear-gradient(180deg, #060d18 0%, #08111f 35%, #0b1220 100%);
      color: #e5eefc;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 34px;
    }

    .back {
      position: absolute;
      left: 20px;
      top: 20px;
    }

    .back a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(12,20,35,0.9);
      border: 1px solid rgba(53,74,102,0.7);
      padding: 25px;
      border-radius: 16px;
      width: 1000px;
      max-width: 96%;
      margin: auto;
      text-align: left;
      box-sizing: border-box;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .label {
      color: #9ca3af;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 18px;
    }

    input[type="text"] {
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 12px;
      box-sizing: border-box;
      font-size: 15px;
      font-family: monospace;
      background: #f8fafc;
      color: #0f172a;
    }

    button {
      margin-top: 14px;
      padding: 10px 16px;
      background: #00ffd5;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      color: #08111f;
    }

    button:hover {
      background: #00e5c0;
    }

    .controls {
      text-align: center;
      margin-top: 20px;
    }

    .status {
      color: #9ca3af;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .results {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      padding: 16px;
      border-radius: 12px;
      min-height: 120px;
    }

    .card-title {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-value {
      color: #00ffd5;
      font-size: 18px;
      word-break: break-word;
      font-family: Consolas, Monaco, monospace;
      line-height: 1.6;
    }

    .good { color: #22c55e; }
    .warn { color: #f59e0b; }
    .bad { color: #ef4444; }

    .note {
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 18px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 28px;
      }

      .box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back</a>
  </div>

  <h1>Password Entropy Calculator</h1>

  <div class="box">
    <div class="label">Enter Password</div>
    <input type="text" id="passwordInput" placeholder="Type a password to analyze...">

    <div class="controls">
      <button onclick="analyzePassword()">Analyze Password</button>
      <button onclick="loadExample()">Load Example</button>
      <button onclick="clearPassword()">Clear</button>
    </div>

    <div class="status" id="status">Enter a password to estimate entropy and brute-force resistance.</div>

    <div class="results" id="results">
      <div class="card">
        <div class="card-title">Results</div>
        <div class="card-value">Password analysis will appear here</div>
      </div>
    </div>

    <div class="note">
      Entropy is an estimate of how difficult a password is to guess or brute-force. This is an educational estimate, not a guarantee of safety.
    </div>
  </div>

  <script>
    function formatLargeNumber(num) {
      if (!isFinite(num)) return "Extremely large";
      if (num < 1000) return num.toFixed(2);
      const units = ["", " thousand", " million", " billion", " trillion", " quadrillion", " quintillion"];
      let unit = 0;
      while (num >= 1000 && unit < units.length - 1) {
        num /= 1000;
        unit++;
      }
      return num.toFixed(2) + units[unit];
    }

    function estimateCrackTime(guesses) {
      const guessesPerSecond = 1e10;
      const seconds = guesses / guessesPerSecond;

      if (!isFinite(seconds) || seconds > 1e20) return "Longer than practical human timescales";
      if (seconds < 1) return "Less than 1 second";
      if (seconds < 60) return Math.round(seconds) + " seconds";
      if (seconds < 3600) return Math.round(seconds / 60) + " minutes";
      if (seconds < 86400) return Math.round(seconds / 3600) + " hours";
      if (seconds < 31536000) return Math.round(seconds / 86400) + " days";
      if (seconds < 31536000 * 100) return Math.round(seconds / 31536000) + " years";
      return "Centuries or more";
    }

    function analyzePassword() {
      const password = document.getElementById("passwordInput").value;
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      if (!password) {
        status.innerText = "Please enter a password first.";
        results.innerHTML = `
          <div class="card">
            <div class="card-title">Results</div>
            <div class="card-value">Password analysis will appear here</div>
          </div>
        `;
        return;
      }

      const hasLower = /[a-z]/.test(password);
      const hasUpper = /[A-Z]/.test(password);
      const hasNumbers = /[0-9]/.test(password);
      const hasSymbols = /[^A-Za-z0-9]/.test(password);

      let charsetSize = 0;
      if (hasLower) charsetSize += 26;
      if (hasUpper) charsetSize += 26;
      if (hasNumbers) charsetSize += 10;
      if (hasSymbols) charsetSize += 33;

      const length = password.length;
      const entropy = charsetSize > 0 ? length * Math.log2(charsetSize) : 0;
      const combinations = Math.pow(charsetSize, length);

      let rating = "";
      let ratingClass = "";

      if (entropy < 40) {
        rating = "Weak";
        ratingClass = "bad";
      } else if (entropy < 60) {
        rating = "Moderate";
        ratingClass = "warn";
      } else if (entropy < 80) {
        rating = "Strong";
        ratingClass = "good";
      } else {
        rating = "Very Strong";
        ratingClass = "good";
      }

      const suggestions = [];
      if (length < 12) suggestions.push("Use a longer password.");
      if (!hasLower) suggestions.push("Add lowercase letters.");
      if (!hasUpper) suggestions.push("Add uppercase letters.");
      if (!hasNumbers) suggestions.push("Add numbers.");
      if (!hasSymbols) suggestions.push("Add symbols.");
      if (suggestions.length === 0) suggestions.push("Good variety detected.");

      results.innerHTML = `
        <div class="card">
          <div class="card-title">Length</div>
          <div class="card-value">${length}</div>
        </div>

        <div class="card">
          <div class="card-title">Character Set Size</div>
          <div class="card-value">${charsetSize}</div>
        </div>

        <div class="card">
          <div class="card-title">Estimated Entropy</div>
          <div class="card-value">${entropy.toFixed(2)} bits</div>
        </div>

        <div class="card">
          <div class="card-title">Possible Combinations</div>
          <div class="card-value">${formatLargeNumber(combinations)}</div>
        </div>

        <div class="card">
          <div class="card-title">Estimated Brute-Force Time</div>
          <div class="card-value">${estimateCrackTime(combinations / 2)}</div>
        </div>

        <div class="card">
          <div class="card-title">Strength Rating</div>
          <div class="card-value ${ratingClass}">${rating}</div>
        </div>

        <div class="card">
          <div class="card-title">Character Types</div>
          <div class="card-value">
            Lowercase: ${hasLower ? "Yes" : "No"}<br>
            Uppercase: ${hasUpper ? "Yes" : "No"}<br>
            Numbers: ${hasNumbers ? "Yes" : "No"}<br>
            Symbols: ${hasSymbols ? "Yes" : "No"}
          </div>
        </div>

        <div class="card">
          <div class="card-title">Suggestions</div>
          <div class="card-value">${suggestions.join("<br>")}</div>
        </div>
      `;

      status.innerText = "Password analysis complete.";
    }

    function loadExample() {
      document.getElementById("passwordInput").value = "CoySecure!2026";
      document.getElementById("status").innerText = "Example loaded.";
      analyzePassword();
    }

    function clearPassword() {
      document.getElementById("passwordInput").value = "";
      document.getElementById("status").innerText = "Cleared.";
      document.getElementById("results").innerHTML = `
        <div class="card">
          <div class="card-title">Results</div>
          <div class="card-value">Password analysis will appear here</div>
        </div>
      `;
    }
  </script>

</body>
</html>
