<!DOCTYPE html>
<html>
<head>
  <title>Subnet Calculator - CyberTechToolkit</title>
  <style>
    body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>

  <div class="back">
    <a href="/">← Back to CyberTechToolkit</a>
  </div>

  <h1>Subnet Calculator</h1>

  <div class="box">
    <div class="input-group">
      <label for="ip">IP Address</label>
      <input type="text" id="ip" placeholder="192.168.1.10">
    </div>

    <div class="input-group">
      <label for="cidr">CIDR Prefix</label>
      <input type="number" id="cidr" placeholder="24" min="0" max="32">
    </div>

    <div style="text-align:center;">
      <button onclick="calculateSubnet()">Calculate</button>
    </div>

    <div class="status" id="status"></div>

    <div class="results" id="results"></div>
  </div>

  <script>
    function ipToInt(ip) {
      const parts = ip.split(".").map(Number);
      if (parts.length !== 4 || parts.some(part => isNaN(part) || part < 0 || part > 255)) {
        return null;
      }
      return ((parts[0] << 24) >>> 0) + ((parts[1] << 16) >>> 0) + ((parts[2] << 8) >>> 0) + (parts[3] >>> 0);
    }

    function intToIp(int) {
      return [
        (int >>> 24) & 255,
        (int >>> 16) & 255,
        (int >>> 8) & 255,
        int & 255
      ].join(".");
    }

    function cidrToMask(cidr) {
      let mask = cidr === 0 ? 0 : (0xffffffff << (32 - cidr)) >>> 0;
      return intToIp(mask);
    }

    function calculateSubnet() {
      const ipInput = document.getElementById("ip").value.trim();
      const cidr = parseInt(document.getElementById("cidr").value, 10);
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      results.innerHTML = "";
      status.innerText = "";

      const ipInt = ipToInt(ipInput);

      if (ipInt === null) {
        status.innerText = "Please enter a valid IPv4 address.";
        return;
      }

      if (isNaN(cidr) || cidr < 0 || cidr > 32) {
        status.innerText = "Please enter a valid CIDR prefix between 0 and 32.";
        return;
      }

      const maskInt = cidr === 0 ? 0 : (0xffffffff << (32 - cidr)) >>> 0;
      const networkInt = ipInt & maskInt;
      const broadcastInt = networkInt | (~maskInt >>> 0);

      let totalHosts = Math.pow(2, 32 - cidr);
      let usableHosts;
      let firstHost = "N/A";
      let lastHost = "N/A";

      if (cidr === 32) {
        usableHosts = 1;
        firstHost = intToIp(networkInt);
        lastHost = intToIp(networkInt);
      } else if (cidr === 31) {
        usableHosts = 2;
        firstHost = intToIp(networkInt);
        lastHost = intToIp(broadcastInt);
      } else {
        usableHosts = totalHosts - 2;
        firstHost = intToIp(networkInt + 1);
        lastHost = intToIp(broadcastInt - 1);
      }

      results.innerHTML = `
        <div class="result-row">
          <div class="result-label">Subnet Mask</div>
          <div class="result-value">${cidrToMask(cidr)}</div>
        </div>

        <div class="result-row">
          <div class="result-label">Network Address</div>
          <div class="result-value">${intToIp(networkInt)}</div>
        </div>

        <div class="result-row">
          <div class="result-label">Broadcast Address</div>
          <div class="result-value">${intToIp(broadcastInt)}</div>
        </div>

        <div class="result-row">
          <div class="result-label">Total Addresses</div>
          <div class="result-value">${totalHosts}</div>
        </div>

        <div class="result-row">
          <div class="result-label">Usable Hosts</div>
          <div class="result-value">${usableHosts}</div>
        </div>

        <div class="result-row">
          <div class="result-label">First Usable Host</div>
          <div class="result-value">${firstHost}</div>
        </div>

        <div class="result-row">
          <div class="result-label">Last Usable Host</div>
          <div class="result-value">${lastHost}</div>
        </div>
      `;

      status.innerText = "Calculation complete.";
    }
  </script>

</body>
</html>
