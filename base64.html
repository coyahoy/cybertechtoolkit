<!DOCTYPE html>
<html>
<head>

<title>Base64 Encoder / Decoder - CyberTechToolkit</title>

<style>

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="back">
<a href="/">← Back to CyberTechToolkit</a>
</div>

<h1>Base64 Encoder / Decoder</h1>

<div class="box">

Enter text

<textarea id="input"></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>

<div class="result" id="output"></div>

</div>

<script>

function encode(){

const text = document.getElementById("input").value;

const encoded = btoa(text);

document.getElementById("output").innerText = encoded;

}

function decode(){

const text = document.getElementById("input").value;

try{

const decoded = atob(text);

document.getElementById("output").innerText = decoded;

}

catch{

document.getElementById("output").innerText = "Invalid Base64 input";

}

}

</script>

</body>
</html>
