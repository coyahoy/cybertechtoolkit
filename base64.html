<!DOCTYPE html>
<html>
<head>

<title>Base64 Encoder / Decoder - CyberTechToolkit</title>

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#00ffd5;
}

.back{
position:absolute;
top:20px;
left:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.box{
background:#111827;
padding:30px;
border-radius:10px;
display:inline-block;
margin-top:30px;
width:420px;
}

textarea{
width:100%;
height:100px;
border-radius:6px;
border:none;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
background:#00ffd5;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
margin-top:10px;
margin-right:5px;
}

.result{
margin-top:20px;
color:#00ffd5;
word-break:break-all;
}

</style>

</head>

<body>

<div class="back">
<a href="/">← Back to CyberTechToolkit</a>
</div>

<h1>Base64 Encoder / Decoder</h1>

<div class="box">

Enter text

<textarea id="input"></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>

<div class="result" id="output"></div>

</div>

<script>

function encode(){

const text = document.getElementById("input").value;

const encoded = btoa(text);

document.getElementById("output").innerText = encoded;

}

function decode(){

const text = document.getElementById("input").value;

try{

const decoded = atob(text);

document.getElementById("output").innerText = decoded;

}

catch{

document.getElementById("output").innerText = "Invalid Base64 input";

}

}

</script>

</body>
</html>
