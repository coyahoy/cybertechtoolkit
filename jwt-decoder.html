<!DOCTYPE html>
<html>
<head>
  <title>JWT Inspector | CyberTechToolkit</title>
  <meta name="description" content="Decode and inspect JWT header and payload claims such as exp, iat, nbf, alg, and typ.">
  <style>
   body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,255,213,0.08), transparent 30%),
linear-gradient(180deg,#060d18 0%,#08111f 35%,#0b1220 100%);
color:#e5eefc;
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#00ffd5;
margin-top:20px;
}

.box{
background:rgba(12,20,35,0.9);
border:1px solid rgba(53,74,102,0.7);
padding:25px;
border-radius:14px;
width:1000px;
max-width:96%;
margin:auto;
text-align:left;
}

textarea,input,select{
width:100%;
border-radius:8px;
border:none;
padding:12px;
font-size:14px;
box-sizing:border-box;
}

textarea{
font-family:monospace;
resize:vertical;
}

button{
margin-top:12px;
padding:10px 16px;
background:#00ffd5;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5c0;
}

.back{
position:absolute;
left:20px;
top:20px;
}

.back a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}
  </style>
</head>
<body>
  <div class="back"><a href="/">← Back to CyberTechToolkit</a></div>
  <h1>JWT Inspector</h1>

  <div class="box">
    <div class="label">Paste JWT</div>
    <textarea id="jwtInput"></textarea>

    <button onclick="decodeJWT()">Inspect JWT</button>

    <div class="status" id="status"></div>

    <div class="output">
      <div class="label">Header</div>
      <pre id="headerOutput"></pre>

      <div class="label">Payload</div>
      <pre id="payloadOutput"></pre>

      <div class="label">Checks</div>
      <pre id="checksOutput"></pre>
    </div>
  </div>

  <script>
    function base64UrlDecode(str) {
      str = str.replace(/-/g, "+").replace(/_/g, "/");
      while (str.length % 4) str += "=";
      return atob(str);
    }

    function formatUnix(ts) {
      if (!ts) return "Not present";
      const date = new Date(ts * 1000);
      return date.toISOString() + " UTC";
    }

    function decodeJWT() {
      const jwt = document.getElementById("jwtInput").value.trim();
      const status = document.getElementById("status");

      try {
        const parts = jwt.split(".");
        if (parts.length < 2) throw new Error("Invalid JWT format");

        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));

        document.getElementById("headerOutput").textContent = JSON.stringify(header, null, 2);
        document.getElementById("payloadOutput").textContent = JSON.stringify(payload, null, 2);

        const now = Math.floor(Date.now() / 1000);
        let checks = [];

        if (header.alg) {
          checks.push("Algorithm: " + header.alg);
          if (header.alg.toLowerCase() === "none") {
            checks.push("Warning: alg=none is insecure.");
          }
        } else {
          checks.push("Algorithm not present.");
        }

        if (payload.exp) {
          checks.push("exp: " + formatUnix(payload.exp));
          checks.push(payload.exp < now ? "Status: Token appears expired." : "Status: Token not expired.");
        } else {
          checks.push("exp: Not present.");
        }

        if (payload.nbf) {
          checks.push("nbf: " + formatUnix(payload.nbf));
          if (payload.nbf > now) checks.push("Status: Token is not valid yet.");
        } else {
          checks.push("nbf: Not present.");
        }

        if (payload.iat) {
          checks.push("iat: " + formatUnix(payload.iat));
        } else {
          checks.push("iat: Not present.");
        }

        if (payload.iss) checks.push("iss: " + payload.iss);
        if (payload.sub) checks.push("sub: " + payload.sub);
        if (payload.aud) checks.push("aud: " + JSON.stringify(payload.aud));

        document.getElementById("checksOutput").textContent = checks.join("\n");
        status.innerText = "JWT inspection complete.";
      } catch {
        document.getElementById("headerOutput").textContent = "Invalid JWT";
        document.getElementById("payloadOutput").textContent = "";
        document.getElementById("checksOutput").textContent = "";
        status.innerText = "Could not decode JWT.";
      }
    }
  </script>
</body>
</html>
